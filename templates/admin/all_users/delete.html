{% extends 'admin/base.html' %}

{% block content %}

<div class="card shadow-sm">

    <div class="card-header bg-danger text-white">
        <h3>Delete User</h3>
    </div>

    <div class="card-body">

        <p class="mb-4">

            Are you sure you want to delete this user?

        </p>

        <table class="table table-bordered">

            <tr>
                <th width="180">Full Name</th>
                <td>{{ user.get_full_name }}</td>
            </tr>

            <tr>
                <th>Username</th>
                <td>{{ user.username }}</td>
            </tr>

            <tr>
                <th>Email</th>
                <td>{{ user.email }}</td>
            </tr>

        </table>

        <form method="POST">

            {% csrf_token %}

            <button class="btn btn-danger">
                Delete User
            </button>

            <a href="{% url 'all_users' %}" class="btn btn-secondary">
                Cancel
            </a>

        </form>

    </div>

</div>

{% endblock %}
