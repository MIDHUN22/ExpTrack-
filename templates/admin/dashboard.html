{% extends 'admin/base.html' %}

{% block content %}

<div class="row g-4">
    <div class="col-md-6 col-xl-3">
        <div class="card bg-primary text-white shadow-sm h-100">
            <div class="card-body d-flex justify-content-between align-items-center">
                <div>
                    <h6 class="text-white-50 mb-2">Total Users</h6>
                    <h3 class="fw-bold mb-0">{{ total_users }}</h3>
                </div>
                <i class="bi bi-people fs-1 opacity-75"></i>
            </div>
        </div>
    </div>

    <!-- Income -->
    <div class="col-md-6 col-xl-3">
        <div class="card bg-success text-white shadow-sm h-100">
            <div class="card-body d-flex justify-content-between align-items-center">
                <div>
                    <h6 class="text-white-50 mb-2">Income Categories</h6>
                    <h3 class="fw-bold mb-0">{{ total_income_categories }}</h3>
                </div>
                <i class="bi bi-currency-rupee fs-1 opacity-75"></i>
            </div>
        </div>
    </div>

    <!-- Expense -->
    <div class="col-md-6 col-xl-3">
        <div class="card bg-danger text-white shadow-sm h-100">
            <div class="card-body d-flex justify-content-between align-items-center">
                <div>
                    <h6 class="text-white-50 mb-2">Expense Categories</h6>
                    <h3 class="fw-bold mb-0">{{ total_expense_categories }}</h3>
                </div>
                <i class="bi bi-activity fs-1 opacity-75"></i>
            </div>
        </div>
    </div>

    <!-- Savings -->
    <div class="col-md-6 col-xl-3">
        <div class="card bg-warning text-dark shadow-sm h-100">
            <div class="card-body d-flex justify-content-between align-items-center">
                <div>
                    <h6 class="text-dark-emphasis mb-2">Total Active Users</h6>
                    <h3 class="fw-bold mb-0">{{ active_users }}</h3>
                </div>
                <i class="bi bi-person-heart fs-1 opacity-75"></i>
            </div>
        </div>
    </div>

</div>

{% endblock %}
