{% extends "auth_base.html" %}

{% block title %}Register{% endblock %}

{% block content %}

<div class="container">

    <div class="row justify-content-center align-items-center vh-100">

        <div class="col-md-7 col-lg-5">

            <div class="card shadow-lg border-0 rounded-4">

                <div class="card-body p-5">

                    <div class="text-center mb-4">
                        <div class="mb-3">
                            <i class="fa-solid fa-wallet fa-3x text-primary"></i>
                        </div>
                        <i class="bi bi-wallet2 text-primary" style="font-size: 3rem;"></i>
                        <h2 class="fw-bold">Create Account</h2>

                        <p class="text-muted">
                            Join ExpTrack and manage your finances.
                        </p>

                    </div>

                    <form method="post">

                        {% csrf_token %}

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    First Name
                                </label>

                                <input type="text" class="form-control" placeholder="John" required>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Last Name
                                </label>

                                <input type="text" class="form-control" placeholder="Doe" required>

                            </div>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Phone Number
                            </label>

                            <input type="tel" class="form-control" placeholder="+91 9876543210" required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Email Address
                            </label>

                            <input type="email" class="form-control" placeholder="example@email.com" required>

                        </div>

                        <div class="mb-4">

                            <label class="form-label">
                                Password
                            </label>

                            <input type="password" class="form-control" placeholder="Enter password" required>

                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2">

                            Create Account

                        </button>

                    </form>

                    <hr class="my-4">

                    <p class="text-center mt-4 mb-0">
                        Already have an account?
                        <a href="{% url 'login' %}" class="fw-semibold text-decoration-none">
                            Login
                        </a>
                    </p>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
