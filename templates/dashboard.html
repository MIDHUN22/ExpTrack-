{% extends 'base.html' %}

{% block content %}

<div class="row g-4">

    <!-- Total Balance -->
    <div class="col-md-6 col-xl-3">
        <div class="card bg-primary text-white shadow-sm h-100">
            <div class="card-body d-flex justify-content-between align-items-center">
                <div>
                    <h6 class="text-white-50 mb-2">Total Balance</h6>
                    <h3 class="fw-bold mb-0">₹25,000</h3>
                </div>
                <i class="bi bi-wallet2 fs-1 opacity-75"></i>
            </div>
        </div>
    </div>

    <!-- Income -->
    <div class="col-md-6 col-xl-3">
        <div class="card bg-success text-white shadow-sm h-100">
            <div class="card-body d-flex justify-content-between align-items-center">
                <div>
                    <h6 class="text-white-50 mb-2">Income</h6>
                    <h3 class="fw-bold mb-0">₹50,000</h3>
                </div>
                <i class="bi bi-cash-stack fs-1 opacity-75"></i>
            </div>
        </div>
    </div>

    <!-- Expense -->
    <div class="col-md-6 col-xl-3">
        <div class="card bg-danger text-white shadow-sm h-100">
            <div class="card-body d-flex justify-content-between align-items-center">
                <div>
                    <h6 class="text-white-50 mb-2">Expense</h6>
                    <h3 class="fw-bold mb-0">₹15,000</h3>
                </div>
                <i class="bi bi-credit-card fs-1 opacity-75"></i>
            </div>
        </div>
    </div>

    <!-- Savings -->
    <div class="col-md-6 col-xl-3">
        <div class="card bg-warning text-dark shadow-sm h-100">
            <div class="card-body d-flex justify-content-between align-items-center">
                <div>
                    <h6 class="text-dark-emphasis mb-2">Savings</h6>
                    <h3 class="fw-bold mb-0">₹35,000</h3>
                </div>
                <i class="bi bi-piggy-bank fs-1 opacity-75"></i>
            </div>
        </div>
    </div>

</div>

{% endblock %}
